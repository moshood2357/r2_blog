<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Vertex Prime Digital Blog{% endblock %}</title>

    {% block meta %}{% endblock meta %}

    <meta name="csrf-token" content="{{ csrf_token() }}">

    <link href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css')}}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css')}}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/fontawesome/css/all.min.css')}}">

    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    {% block style %}
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
        }

        /* HEADER */

        header {
            background: #0B1F3B;
            color: white;
            padding: 20px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-title {
            text-align: center;
            flex: 1;
        }

        .header-title h1 {
            margin: 0;
            font-size: 26px;
        }

        .header-title p {
            margin: 0;
            font-size: 14px;
            opacity: .9;
        }

        /* MAIN */

        main {
            flex: 1;
            /* padding: 40px 15px; */
        }

        /* FOOTER */

        footer {
            margin-top: auto;
        }

        /* MOBILE */

        @media (max-width:768px) {

            .header-container {
                flex-direction: column;
                text-align: center;
            }

            .header-title h1 {
                font-size: 22px;
            }

        }
    </style>
    {% endblock %}

</head>

<body>

    <header>

        <div class="container">

            <div class="header-container">

                <div class="header-title">

                    <h1>Vertex Prime Digital Blog</h1>
                    <p>Latest posts from our team</p>

                </div>

                <a href="{{ url_for('main.blog') }}" class="btn btn-outline-light btn-sm">

                    Go Home

                </a>

            </div>

        </div>

    </header>


    <main class="">

        {% block content %}{% endblock %}

    </main>


    <footer class="bg-dark text-white py-4">

        <div class="container text-center">

            <p class="mb-0">
                © {{ now.year }} Vertex Prime Digital. All rights reserved.
            </p>

        </div>

    </footer>


    <!-- JS -->

    <script src="{{url_for('static', filename='bootstrap/js/bootstrap.js')}}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block js %}{% endblock js %}

</body>

</html>
