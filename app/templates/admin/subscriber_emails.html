{% extends "admin/base.html" %}

{% block content %}
<section class="container py-5">
    <h2 class="mb-4">Subscriber Emails</h2>

    {% if subscribers %}
    <ul class="list-group">
        {% for subscriber in subscribers %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ subscriber.email }}</span>

            <form action="{{ url_for('admin.delete_subscriber', subscriber_id=subscriber.id) }}" method="POST"
                style="margin:0;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <button type="submit" class="btn btn-sm btn-danger"
                    onclick="return confirm('Are you sure you want to delete this subscriber?');">
                    Delete
                </button>
            </form>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <div class="alert alert-info">No subscribers found.</div>
    {% endif %}

    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary mt-3">
        Back to Dashboard
    </a>
</section>
{% endblock %}
